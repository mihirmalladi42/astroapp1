<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Sky Lens</title>
    <link rel="stylesheet" href="styles.css?v=20260708-heading-flip-guard">
  </head>
  <body>
    <main class="app-shell">
      <section class="viewer" aria-label="Live sky camera">
        <video id="camera" autoplay playsinline muted></video>
        <img id="skyImage" alt="Deep sky survey image for the camera center">
        <div class="reticle" aria-hidden="true">
          <span></span>
        </div>
        <div id="targetCheck" class="target-check hidden" aria-label="Target will be in resolved image">✓</div>
        <div class="top-bar">
          <div class="status-card">
            <p class="label">Sky Lens</p>
            <p id="status">Start sensors to resolve the camera center.</p>
          </div>
          <div class="top-actions">
            <button id="catalogButton" type="button">Catalog</button>
            <button id="startButton" type="button">Start</button>
          </div>
        </div>
        <div id="guideIndicator" class="guide-indicator hidden" aria-live="polite">
          <strong id="guideTarget">No target</strong>
          <span id="guideDirection">Choose a catalog target</span>
        </div>
        <section id="catalogPanel" class="catalog-panel hidden" aria-label="Catalog search">
          <div class="catalog-grid">
            <label class="wide-control">
              Search
              <input id="catalogSearch" type="search" autocomplete="off" placeholder="M31, NGC 7000, Polaris">
            </label>
            <label>
              Catalog
              <select id="catalogFilter">
                <option value="all">All</option>
                <option value="ngc">NGC</option>
                <option value="messier">Messier</option>
                <option value="caldwell">Caldwell</option>
                <option value="star">Stars</option>
                <option value="solar">Solar System</option>
              </select>
            </label>
            <label>
              Type
              <select id="typeFilter">
                <option value="all">All</option>
                <option value="galaxy">Galaxy</option>
                <option value="nebula">Nebula</option>
                <option value="cluster">Cluster</option>
                <option value="star">Star</option>
                <option value="solar-system">Solar System</option>
              </select>
            </label>
            <label class="checkbox-control wide-control">
              <input id="aboveHorizonFilter" type="checkbox">
              <span>Above horizon</span>
            </label>
          </div>
          <p id="catalogCount" class="catalog-count">Loading catalog...</p>
          <div id="catalogResults" class="catalog-results"></div>
        </section>
        <div class="readout" aria-live="polite">
          <div>
            <span>Az</span>
            <strong id="azimuthValue">--</strong>
          </div>
          <div>
            <span>Alt</span>
            <strong id="altitudeValue">--</strong>
          </div>
          <div>
            <span>RA</span>
            <strong id="raValue">--</strong>
          </div>
          <div>
            <span>Dec</span>
            <strong id="decValue">--</strong>
          </div>
          <div class="wide">
            <span>UTC</span>
            <strong id="utcValue">--</strong>
          </div>
          <div class="wide">
            <span>Coords</span>
            <strong id="coordsValue">--</strong>
          </div>
        </div>
        <div class="controls">
          <button id="resolveButton" type="button" disabled>Resolve</button>
          <a id="imageLink" class="image-link disabled" href="https://skyview.gsfc.nasa.gov/current/cgi/query.pl" target="_blank" rel="noreferrer">Open resolved image</a>
          <button id="restartCameraButton" class="wide-control hidden" type="button">Live camera again</button>
        </div>
      </section>
    </main>
    <script src="catalog.js?v=20260708-heading-flip-guard"></script>
    <script src="vendor/astronomy.browser.min.js?v=2.1.19"></script>
    <script src="app.js?v=20260708-heading-flip-guard"></script>
  </body>
</html>
